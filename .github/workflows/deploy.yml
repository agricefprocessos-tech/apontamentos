name: 🚀 Deploy AGRICEF — Apps Script

# Dispara quando agricef-appsscript.gs muda na branch main
on:
  push:
    branches: [main]
    paths:
      - 'agricef-appsscript.gs'
      - 'appsscript.json'

jobs:
  deploy-apps-script:
    name: Push + Deploy no Apps Script
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar clasp
        run: npm install -g @google/clasp

      - name: Configurar credenciais clasp
        # CLASPRC_JSON = conteúdo do arquivo ~/.clasprc.json após "clasp login"
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Verificar arquivos a enviar
        run: |
          echo "=== Arquivos do projeto ==="
          ls -la
          echo "=== Conteúdo .clasp.json ==="
          cat .clasp.json

      - name: Push código para Apps Script
        run: clasp push --force

      - name: Criar nova versão de implantação
        run: |
          clasp deploy \
            --deploymentId "${{ secrets.CLASP_DEPLOYMENT_ID }}" \
            --description "Deploy ${{ github.run_number }} — $(date +'%d/%m/%Y %H:%M')" \
          && echo "✅ Deploy concluído com sucesso"
